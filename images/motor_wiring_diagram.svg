<svg width="680" height="615" viewBox="0 0 680 615" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="615" fill="white"/>

  <!-- Navigator -->
  <rect x="10" y="224" width="150" height="170" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="85" y="247" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Navigator</text>
  <text x="85" y="264" text-anchor="middle" font-size="12" fill="#185FA5">I²C Bus 6</text>
  <text x="22" y="286" font-size="12" fill="#185FA5">1 - VCC (5V)</text>
  <text x="22" y="304" font-size="12" fill="#185FA5">2 - SCL</text>
  <text x="22" y="322" font-size="12" fill="#185FA5">3 - SDA</text>
  <text x="22" y="340" font-size="12" fill="#185FA5">4 - GND</text>
  <text x="22" y="362" font-size="12" fill="#185FA5">/dev/i2c-6</text>

  <!-- I2C arrow -->
  <line x1="160" y1="309" x2="193" y2="309" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="176" y="303" text-anchor="middle" font-size="12" fill="#22c55e">I²C</text>

  <!-- PCA9685 -->
  <rect x="195" y="224" width="165" height="170" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="277" y="247" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">PCA9685</text>
  <text x="277" y="264" text-anchor="middle" font-size="12" fill="#0F6E56">addr: 0x40, 1kHz</text>
  <line x1="207" y1="274" x2="348" y2="274" stroke="#0F6E56" stroke-opacity="0.25" stroke-width="0.5"/>
  <text x="207" y="291" font-size="12" fill="#085041">ch 0 → Motor 1</text>
  <text x="207" y="313" font-size="12" fill="#085041">ch 1 → Solenoid 1</text>
  <text x="207" y="335" font-size="12" fill="#085041">ch 2 → Motor 2</text>
  <text x="207" y="357" font-size="12" fill="#085041">ch 3 → Solenoid 2</text>

  <!-- 12V supply -->
  <rect x="10" y="415" width="150" height="55" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="85" y="437" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">12V supply</text>
  <text x="85" y="455" text-anchor="middle" font-size="12" fill="#534AB7">VM to both drivers</text>

  <!-- Common GND -->
  <rect x="10" y="482" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="85" y="503" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Common GND</text>
  <text x="85" y="520" text-anchor="middle" font-size="12" fill="#5F5E5A">All devices share</text>

  <!-- Legend -->
  <rect x="10" y="548" width="278" height="36" rx="6" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <line x1="22" y1="566" x2="54" y2="566" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="62" y="570" font-size="12" fill="#444">Signal — 3.3V PWM from PCA9685</text>

  <!-- Motor driver 1 label -->
  <text x="550" y="20" text-anchor="middle" font-size="12" fill="#6b7280">Motor driver 1</text>

  <!-- Channel A, Driver 1 -->
  <rect x="430" y="30" width="240" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="53" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Channel A</text>
  <text x="550" y="73" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">IN1=ch0, IN2=GND</text>

  <line x1="550" y1="92" x2="550" y2="109" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Motor 1 output -->
  <rect x="430" y="113" width="240" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="550" y="135" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">Motor 1 (OUT1/OUT2)</text>

  <!-- Channel B, Driver 1 -->
  <rect x="430" y="175" width="240" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="198" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Channel B</text>
  <text x="550" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">IN3=ch1, IN4=GND</text>

  <line x1="550" y1="237" x2="550" y2="249" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Solenoid 1 output -->
  <rect x="430" y="253" width="240" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="550" y="275" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#633806">Solenoid 1 (OUT3/OUT4)</text>

  <!-- Driver separator -->
  <line x1="432" y1="305" x2="668" y2="305" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Motor driver 2 label -->
  <text x="550" y="320" text-anchor="middle" font-size="12" fill="#6b7280">Motor driver 2</text>

  <!-- Channel A, Driver 2 -->
  <rect x="430" y="327" width="240" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="350" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Channel A</text>
  <text x="550" y="370" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">IN1=ch2, IN2=GND</text>

  <line x1="550" y1="389" x2="550" y2="401" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Motor 2 output -->
  <rect x="430" y="405" width="240" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="550" y="427" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">Motor 2 (OUT1/OUT2)</text>

  <!-- Channel B, Driver 2 -->
  <rect x="430" y="467" width="240" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="490" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Channel B</text>
  <text x="550" y="510" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">IN3=ch3, IN4=GND</text>

  <line x1="550" y1="529" x2="550" y2="541" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Solenoid 2 output -->
  <rect x="430" y="545" width="240" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="550" y="567" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#633806">Solenoid 2 (OUT3/OUT4)</text>

  <!-- Green signal arrows from PCA9685 to Channel boxes -->
  <path d="M360,291 C402,291 402,60 430,60" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="170" text-anchor="middle" font-size="12" fill="#22c55e">ch 0</text>

  <path d="M360,313 C402,313 402,205 430,205" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="256" text-anchor="middle" font-size="12" fill="#22c55e">ch 1</text>

  <path d="M360,335 C402,335 402,357 430,357" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="344" text-anchor="middle" font-size="12" fill="#22c55e">ch 2</text>

  <path d="M360,357 C402,357 402,497 430,497" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="424" text-anchor="middle" font-size="12" fill="#22c55e">ch 3</text>
</svg>
