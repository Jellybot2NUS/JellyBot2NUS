<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechanical | Jellybot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0f1a;
      --deep: #060c16;
      --surface: #0e1828;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text: #e8edf5;
      --muted: rgba(232,237,245,0.5);
      --accent: #4db8d4;
      --accent-dim: rgba(77,184,212,0.12);
      --accent-glow: rgba(77,184,212,0.3);
      --seafoam: #6ee7c7;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--deep);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.7;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--deep); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* ─── NAV ───────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(6,12,22,0.97) 0%, transparent 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: padding 0.3s ease, background 0.3s ease;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6em;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }

    nav { display: flex; gap: 40px; }
    nav a {
      font-family: 'DM Mono', monospace;
      font-size: 0.72em;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }
    nav a:hover { color: var(--text); }
    nav a:hover::after { transform: scaleX(1); }

    /* ─── HERO ──────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      overflow: hidden;
      padding: 0 60px 64px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://github.com/JellyBotNUS/JellyBotNUS.github.io/blob/main/images/backgroundimage.jpg?raw=true');
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      filter: saturate(0.5) brightness(0.7);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 80%, rgba(77,184,212,0.1) 0%, transparent 70%),
        linear-gradient(to bottom, rgba(6,12,22,0.3) 0%, rgba(6,12,22,0.0) 30%, rgba(6,12,22,0.85) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      animation: fadeUp 1s ease 0.2s both;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.68em;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: block;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3em, 7vw, 5.5em);
      font-weight: 300;
      line-height: 1.0;
      color: var(--text);
    }
    .hero h1 em { font-style: italic; color: var(--accent); }

    .hero-sub {
      font-size: 1em;
      font-weight: 200;
      color: var(--muted);
      margin-top: 20px;
      letter-spacing: 0.03em;
      max-width: 55ch;
    }

    .hero-author {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65em;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .hero-author::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── LAYOUT ────────────────────────────────────── */
    .page-body {
      display: grid;
      grid-template-columns: 260px 1fr;
      max-width: 1300px;
      margin: 0 auto;
      padding: 60px 60px 120px;
    }

    /* ─── SIDEBAR / TOC ─────────────────────────────── */
    .sidebar {
      position: sticky;
      top: 100px;
